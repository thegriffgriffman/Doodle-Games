<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stickman King</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #743d1c 0%, #a85c2d 100%);
      font-family: Arial, sans-serif;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    canvas {
      border: 5px solid #ffd700;
      background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      display: block;
      border-radius: 8px;
    }

    .controls {
      color: white;
      text-align: center;
      font-size: 14px;
      line-height: 1.8;
    }

    .title { font-size: 24px; color: #ffd700; font-weight: bold; margin-bottom: 10px; }
    .stats { font-size: 16px; color: #ffff00; }

    button {
      background: #ffd700;
      color: #743d1c;
      border: none;
      padding: 10px 30px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      transition: all 0.3s;
    }

    button:hover {
      background: #ffff00;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="title">👑 STICKMAN KING 👑</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="controls">
      <div class="stats">Score: <span id="score">0</span> | Wave: <span id="wave">1</span> | Health: <span id="health">100</span></div>
      <div>← → Move | SPACE Attack</div>
      <button onclick="location.href='../'">Back to Games</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    class Particle {
      constructor(x, y, vx, vy, color, life = 30) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.life = life;
        this.maxLife = life;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.3;
        this.life--;
      }

      draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillRect(this.x - 2, this.y - 2, 4, 4);
        ctx.globalAlpha = 1;
      }
    }

    class King {
      constructor() {
        this.x = canvas.width / 2;
        this.y = canvas.height - 120;
        this.width = 20;
        this.height = 50;
        this.vx = 0;
        this.health = 100;
        this.maxHealth = 100;
        this.attacking = false;
        this.attackCooldown = 0;
        this.damageFlash = 0;
      }

      update() {
        this.vx *= 0.9;
        this.x += this.vx;
        this.x = Math.max(40, Math.min(canvas.width - 40, this.x));

        if (this.attacking) this.attacking = false;
        if (this.attackCooldown > 0) this.attackCooldown--;
        if (this.damageFlash > 0) this.damageFlash--;
      }

      draw() {
        if (this.damageFlash % 4 > 1) return;

        // Crown
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.moveTo(this.x - 15, this.y - 35);
        ctx.lineTo(this.x - 12, this.y - 45);
        ctx.lineTo(this.x - 5, this.y - 40);
        ctx.lineTo(this.x, this.y - 48);
        ctx.lineTo(this.x + 5, this.y - 40);
        ctx.lineTo(this.x + 12, this.y - 45);
        ctx.lineTo(this.x + 15, this.y - 35);
        ctx.fill();

        // Head
        ctx.fillStyle = '#ff9999';
        ctx.beginPath();
        ctx.arc(this.x, this.y - 30, 12, 0, Math.PI * 2);
        ctx.fill();

        // Eyes
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(this.x - 4, this.y - 32, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x + 4, this.y - 32, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(this.x - 4, this.y - 32, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x + 4, this.y - 32, 1.5, 0, Math.PI * 2);
        ctx.fill();

        // Body
        ctx.strokeStyle = '#ff9999';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y - 18);
        ctx.lineTo(this.x, this.y + 15);
        ctx.stroke();

        // Attack effect
        if (this.attacking) {
          ctx.strokeStyle = 'rgba(255,200,0,0.8)';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(this.x, this.y - 10, 30, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Arms
        let armAngle = 0.3;
        if (this.attacking) armAngle = 1.5;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y - 10);
        ctx.lineTo(this.x + Math.cos(armAngle) * 20, this.y - 10 + Math.sin(armAngle) * 20);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(this.x, this.y - 10);
        ctx.lineTo(this.x - 15, this.y - 5);
        ctx.stroke();

        // Legs
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + 15);
        ctx.lineTo(this.x - 7, this.y + 35);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + 15);
        ctx.lineTo(this.x + 7, this.y + 35);
        ctx.stroke();

        // Health bar
        const barWidth = 50;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(this.x - barWidth / 2, this.y - 50, barWidth, 5);
        ctx.fillStyle = this.health > 50 ? '#00ff00' : this.health > 25 ? '#ffff00' : '#ff0000';
        ctx.fillRect(this.x - barWidth / 2, this.y - 50, (barWidth * this.health) / this.maxHealth, 5);
      }

      move(direction) {
        this.vx = direction * 5;
      }

      attack() {
        if (this.attackCooldown === 0) {
          this.attacking = true;
          this.attackCooldown = 20;
          return true;
        }
        return false;
      }

      takeDamage(amount) {
        this.health = Math.max(0, this.health - amount);
        this.damageFlash = 8;
        for (let i = 0; i < 8; i++) {
          particles.push(new Particle(
            this.x + (Math.random() - 0.5) * 20,
            this.y + (Math.random() - 0.5) * 20,
            (Math.random() - 0.5) * 5,
            Math.random() * 3 - 5,
            '#ff0000'
          ));
        }
      }
    }

    class Enemy {
      constructor(x, wave) {
        this.x = x;
        this.y = 60;
        this.health = 20 + wave * 5;
        this.maxHealth = this.health;
        this.speed = 1 + wave * 0.2;
        this.damageFlash = 0;
      }

      update(kingX) {
        if (this.x < kingX) this.x += this.speed;
        else this.x -= this.speed;
        if (this.damageFlash > 0) this.damageFlash--;
      }

      draw() {
        if (this.damageFlash % 4 > 1) return;

        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(this.x, this.y - 15, 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(this.x - 3, this.y - 16, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x + 3, this.y - 16, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#ff0000';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y - 7);
        ctx.lineTo(this.x, this.y + 10);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(this.x, this.y + 10);
        ctx.lineTo(this.x - 5, this.y + 20);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + 10);
        ctx.lineTo(this.x + 5, this.y + 20);
        ctx.stroke();

        // Health bar
        const barWidth = 25;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(this.x - barWidth / 2, this.y - 27, barWidth, 3);
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(this.x - barWidth / 2, this.y - 27, (barWidth * this.health) / this.maxHealth, 3);
      }

      takeDamage(amount) {
        this.health -= amount;
        this.damageFlash = 8;
        for (let i = 0; i < 5; i++) {
          particles.push(new Particle(
            this.x + (Math.random() - 0.5) * 10,
            this.y + (Math.random() - 0.5) * 10,
            (Math.random() - 0.5) * 4,
            Math.random() * 3 - 3,
            '#ffaa00'
          ));
        }
      }

      isDead() {
        return this.health <= 0;
      }
    }

    let king = new King();
    let enemies = [];
    let particles = [];
    let score = 0;
    let wave = 1;
    let spawnTimer = 0;
    let gameActive = true;

    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
      if (e.key === ' ') {
        e.preventDefault();
        if (king.attack()) {
          checkAttackCollision();
        }
      }
    });
    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function checkAttackCollision() {
      for (let i = 0; i < enemies.length; i++) {
        const dist = Math.hypot(enemies[i].x - king.x, enemies[i].y - king.y);
        if (dist < 40) {
          enemies[i].takeDamage(50);
          if (enemies[i].isDead()) {
            score += 100;
          }
        }
      }
    }

    function update() {
      if (!gameActive) return;

      if (keys['arrowleft']) king.move(-1);
      if (keys['arrowright']) king.move(1);

      king.update();

      spawnTimer++;
      const spawnRate = Math.max(30, 80 - wave * 5);
      if (spawnTimer > spawnRate) {
        const count = Math.min(1 + Math.floor(wave / 3), 3);
        for (let i = 0; i < count; i++) {
          enemies.push(new Enemy(Math.random() * (canvas.width - 80) + 40, wave));
        }
        spawnTimer = 0;
      }

      enemies.forEach(e => e.update(king.x));
      particles.forEach(p => p.update());
      particles = particles.filter(p => p.life > 0);

      enemies.forEach(e => {
        if (e.x < king.x + 20 && e.x > king.x - 20 && e.y > king.y - 40) {
          king.takeDamage(5);
          e.x += e.speed > 0 ? -3 : 3;
        }
      });

      enemies = enemies.filter(e => !e.isDead());

      if (enemies.length === 0 && spawnTimer > 100) {
        wave++;
      }

      if (king.health <= 0) {
        gameActive = false;
      }
    }

    function draw() {
      // Sky
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#87ceeb');
      gradient.addColorStop(1, '#e0f6ff');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Throne base
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(canvas.width / 2 - 40, canvas.height - 150, 80, 60);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(canvas.width / 2 - 35, canvas.height - 140, 70, 10);

      // Ground
      ctx.fillStyle = '#90ee90';
      ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
      ctx.strokeStyle = '#228b22';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, canvas.height - 80);
      ctx.lineTo(canvas.width, canvas.height - 80);
      ctx.stroke();

      king.draw();
      enemies.forEach(e => e.draw());
      particles.forEach(p => p.draw());

      if (!gameActive) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffff00';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
        ctx.font = '24px Arial';
        ctx.fillText('Final Score: ' + score, canvas.width / 2, canvas.height / 2 + 50);
      }
    }

    function updateUI() {
      document.getElementById('score').textContent = score;
      document.getElementById('wave').textContent = wave;
      document.getElementById('health').textContent = Math.max(0, Math.floor(king.health));
    }

    function gameLoop() {
      update();
      draw();
      updateUI();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
