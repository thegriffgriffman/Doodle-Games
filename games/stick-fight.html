<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stick Fight - The Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: Arial, sans-serif;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    canvas {
      border: 5px solid white;
      background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      display: block;
      border-radius: 8px;
    }

    .controls {
      color: white;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
    }

    .controls p { margin: 5px 0; }
    .player1 { color: #ff4444; font-weight: bold; }
    .player2 { color: #44ff44; font-weight: bold; }
    .title { font-size: 24px; color: white; font-weight: bold; margin-bottom: 10px; }
    .score { font-size: 18px; color: #ffff00; margin: 10px 0; }

    button {
      background: white;
      color: #667eea;
      border: none;
      padding: 10px 30px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      transition: all 0.3s;
    }

    button:hover {
      background: #ffff00;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="title">⚔️ STICK FIGHT ⚔️</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="controls">
      <div class="score"><span id="score"></span></div>
      <div class="player1">Player 1 (Red): A/D Move • W Jump • CLICK to Punch</div>
      <div class="player2">Player 2 (Green): ← → Move • ↑ Jump • SPACE to Punch</div>
      <button onclick="location.href='../'">Back to Games</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game constants
    const GROUND_Y = canvas.height - 100;
    const GRAVITY = 0.5;

    // Player class with animations
    class StickFighter {
      constructor(x, color, isPlayer2 = false) {
        this.x = x;
        this.y = GROUND_Y;
        this.vx = 0;
        this.vy = 0;
        this.width = 20;
        this.height = 60;
        this.color = color;
        this.isPlayer2 = isPlayer2;
        this.isJumping = false;
        this.health = 100;
        this.punchCooldown = 0;
        this.punchAnimation = 0;
        this.damageFlash = 0;
      }

      update() {
        // Physics
        this.vy += GRAVITY;
        this.y += this.vy;
        this.x += this.vx;

        // Friction
        this.vx *= 0.95;

        // Ground collision
        if (this.y >= GROUND_Y) {
          this.y = GROUND_Y;
          this.vy = 0;
          this.isJumping = false;
        }

        // Boundary
        this.x = Math.max(20, Math.min(canvas.width - 20, this.x));

        // Animation timers
        if (this.punchAnimation > 0) this.punchAnimation--;
        if (this.punchCooldown > 0) this.punchCooldown--;
        if (this.damageFlash > 0) this.damageFlash--;
      }

      draw() {
        // Flash when hit
        if (this.damageFlash % 6 > 2) return;

        const headX = this.x;
        const headY = this.y - 35;

        // Head
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(headX, headY, 12, 0, Math.PI * 2);
        ctx.fill();

        // Eyes
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(headX - 4, headY - 3, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(headX + 4, headY - 3, 3, 0, Math.PI * 2);
        ctx.fill();

        // Pupils
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(headX - 4, headY - 3, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(headX + 4, headY - 3, 1.5, 0, Math.PI * 2);
        ctx.fill();

        // Smile
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(headX, headY + 2, 3, 0, Math.PI);
        ctx.stroke();

        // Body
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(headX, headY + 12);
        ctx.lineTo(headX, headY + 30);
        ctx.stroke();

        // Left Arm
        const armY = headY + 15;
        let armAngle = this.isPlayer2 ? -0.3 : -0.3;
        if (this.punchAnimation > 0) {
          armAngle = this.isPlayer2 ? -Math.PI * 0.8 : -Math.PI * 0.2;
        }
        const armLen = 18;
        const armX2 = headX + Math.cos(armAngle) * armLen;
        const armY2 = armY + Math.sin(armAngle) * armLen;
        ctx.beginPath();
        ctx.moveTo(headX, armY);
        ctx.lineTo(armX2, armY2);
        ctx.stroke();

        // Right Arm
        armAngle = this.isPlayer2 ? 0.3 : 0.3;
        if (this.punchAnimation > 0) {
          armAngle = this.isPlayer2 ? -Math.PI * 0.2 : -Math.PI * 0.8;
        }
        const armX3 = headX + Math.cos(armAngle) * armLen;
        const armY3 = armY + Math.sin(armAngle) * armLen;
        ctx.beginPath();
        ctx.moveTo(headX, armY);
        ctx.lineTo(armX3, armY3);
        ctx.stroke();

        // Legs
        ctx.beginPath();
        ctx.moveTo(headX, headY + 30);
        ctx.lineTo(headX - 8, headY + 50);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(headX, headY + 30);
        ctx.lineTo(headX + 8, headY + 50);
        ctx.stroke();

        // Health bar
        const barWidth = 40;
        const barHeight = 5;
        const barX = this.x - barWidth / 2;
        const barY = this.y - 50;

        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(barX, barY, barWidth, barHeight);
        ctx.fillStyle = this.health > 50 ? '#44ff44' : this.health > 25 ? '#ffff00' : '#ff4444';
        ctx.fillRect(barX, barY, (barWidth * this.health) / 100, barHeight);
      }

      jump() {
        if (!this.isJumping) {
          this.vy = -12;
          this.isJumping = true;
        }
      }

      punch() {
        if (this.punchCooldown === 0) {
          this.punchAnimation = 8;
          this.punchCooldown = 15;
          return true;
        }
        return false;
      }

      move(direction) {
        this.vx = direction * 5;
      }

      takeDamage(amount) {
        this.health = Math.max(0, this.health - amount);
        this.damageFlash = 8;
      }
    }

    // Game state
    let player1 = new StickFighter(150, '#ff4444', false);
    let player2 = new StickFighter(canvas.width - 150, '#44ff44', true);
    let gameActive = true;
    let gameTime = 0;
    let player1Wins = 0;
    let player2Wins = 0;

    // Input handling
    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
      if (e.key === ' ') {
        e.preventDefault();
        if (player2.punch()) {
          checkPunchCollision(player2, player1);
        }
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    canvas.addEventListener('click', (e) => {
      if (player1.punch()) {
        checkPunchCollision(player1, player2);
      }
    });

    function checkPunchCollision(puncher, target) {
      const distance = Math.abs(puncher.x - target.x);
      if (distance < 50 && puncher.punchAnimation > 3) {
        target.takeDamage(20);
        target.vx += puncher.x < target.x ? 5 : -5;
        target.vy = -3;
      }
    }

    function update() {
      if (!gameActive) return;

      // Player 1 controls
      if (keys['a']) player1.move(-1);
      if (keys['d']) player1.move(1);
      if (keys['w']) player1.jump();

      // Player 2 controls
      if (keys['arrowleft']) player2.move(-1);
      if (keys['arrowright']) player2.move(1);
      if (keys['arrowup']) player2.jump();

      player1.update();
      player2.update();

      gameTime++;

      // Check for round end
      if (player1.health <= 0 || player2.health <= 0) {
        gameActive = false;
        if (player1.health <= 0) player2Wins++;
        if (player2.health <= 0) player1Wins++;
      }
    }

    function draw() {
      // Sky gradient
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#87ceeb');
      gradient.addColorStop(1, '#e0f6ff');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Ground
      ctx.fillStyle = '#8b7355';
      ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);

      // Grass line
      ctx.strokeStyle = '#228b22';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y);
      ctx.lineTo(canvas.width, GROUND_Y);
      ctx.stroke();

      player1.draw();
      player2.draw();

      // Game over message
      if (!gameActive) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffff00';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        const winner = player1.health > 0 ? 'PLAYER 1 WINS!' : 'PLAYER 2 WINS!';
        ctx.fillText(winner, canvas.width / 2, canvas.height / 2 - 30);
        ctx.font = 'bold 24px Arial';
        ctx.fillText('Reloading in 3 seconds...', canvas.width / 2, canvas.height / 2 + 20);
      }
    }

    function updateScore() {
      document.getElementById('score').textContent = `Wins - Player 1: ${player1Wins} | Player 2: ${player2Wins}`;
    }

    function gameLoop() {
      update();
      draw();
      updateScore();

      if (!gameActive && gameTime > 0) {
        if ((Date.now() - gameTime) > 3000) {
          location.reload();
        }
      }

      requestAnimationFrame(gameLoop);
    }

    gameTime = Date.now();
    gameLoop();
  </script>
</body>
</html>
